  <title>Play4TheCoin — Championship Series · Lexus Demo</title>

  <style>
/* Play4TheCoin — Lexus demo. House style: dark + champagne gold + cream,
   Anton (display) / Oswald (labels) / Jost (body). The same system the deck
   adopted from the Masters Cup invite — applied here as real web fonts. */

:root {
  --ink: #0a0a0a;
  --ink-2: #141414;
  --panel: #1b1a18;
  --line: #2a2824;
  --cream: #f4f1ea;
  --cream-2: #e8e3d8;
  --gold: #c9a961;
  --gold-l: #efd9a0;
  --gold-d: #94722f;
  --grey: #9d988c;
  --grey-2: #b8b3a8;
  --green: #34a86a;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: radial-gradient(120% 90% at 50% -10%, #1d1b17 0%, var(--ink) 60%);
  color: var(--cream-2);
  font-family: 'Jost', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* --- Type roles --- */
.display { font-family: 'Anton', sans-serif; text-transform: uppercase; letter-spacing: .01em; line-height: .98; color: var(--cream); }
.eyebrow { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: .34em; font-weight: 400; font-size: 11px; color: var(--gold); }
.label  { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: .18em; font-weight: 500; color: var(--cream); }
.lead   { font-family: 'Jost', sans-serif; font-weight: 300; font-style: italic; color: var(--grey-2); }
.gold { color: var(--gold); }
.muted { color: var(--grey); }

/* --- Shell --- */
header.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 26px; border-bottom: 1px solid var(--line);
  background: rgba(10,10,10,.6); backdrop-filter: blur(6px);
  position: sticky; top: 0; z-index: 20;
}
.brand { display: flex; flex-direction: column; gap: 3px; }
.brand .wordmark { font-family: 'Anton', sans-serif; text-transform: uppercase; letter-spacing: .02em; font-size: 22px; color: var(--cream); }
.brand .wordmark span { color: var(--gold); }
.brand .sub { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: .28em; font-size: 9px; color: var(--grey); }
.headline-badge {
  font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: .2em; font-size: 11px;
  color: var(--ink); background: linear-gradient(180deg, var(--gold-l), var(--gold)); padding: 7px 14px; border-radius: 2px; font-weight: 600;
}
.headline-badge small { display: block; font-size: 8px; letter-spacing: .26em; color: var(--gold-d); }

nav.tabs { display: flex; flex-wrap: wrap; gap: 4px; padding: 12px 20px; border-bottom: 1px solid var(--line); }
nav.tabs button {
  font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: .14em; font-size: 12px; font-weight: 500;
  color: var(--grey-2); background: transparent; border: 1px solid transparent; padding: 8px 14px; border-radius: 2px; cursor: pointer;
}
nav.tabs button:hover { color: var(--cream); }
nav.tabs button.active { color: var(--ink); background: var(--gold); }
nav.tabs button:disabled { opacity: .4; cursor: not-allowed; }

main { max-width: 920px; margin: 0 auto; padding: 34px 22px 80px; }
.view { animation: fade .35s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

h1.title { margin: 0 0 6px; font-size: clamp(34px, 6vw, 64px); }
.view > .eyebrow { display: block; margin-bottom: 12px; }
.view p.lead { font-size: clamp(15px, 1.8vw, 21px); margin: 0 0 26px; max-width: 60ch; }

/* --- Cards / panels --- */
.grid { display: grid; gap: 16px; }
.grid.cols-2 { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
.grid.cols-3 { grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
.card {
  background: linear-gradient(180deg, var(--panel), var(--ink-2));
  border: 1px solid var(--line); border-radius: 4px; padding: 20px;
}
.card .label { font-size: 13px; margin-bottom: 10px; display: block; }
.stat { font-family: 'Anton', sans-serif; font-size: 40px; color: var(--gold); line-height: 1; }
.stat-sub { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: .18em; font-size: 10px; color: var(--grey); margin-top: 6px; }

/* --- Forms --- */
label.field { display: block; margin-bottom: 16px; }
label.field .label { font-size: 11px; }
input, select {
  width: 100%; margin-top: 6px; padding: 12px 14px; background: var(--ink); color: var(--cream);
  border: 1px solid var(--line); border-radius: 3px; font-family: 'Jost', sans-serif; font-size: 15px;
}
input:focus, select:focus { outline: none; border-color: var(--gold); }

button.cta {
  font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: .18em; font-weight: 600; font-size: 13px;
  color: var(--ink); background: linear-gradient(180deg, var(--gold-l), var(--gold));
  border: none; padding: 13px 22px; border-radius: 3px; cursor: pointer;
}
button.cta:hover { filter: brightness(1.06); }
button.ghost {
  font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: .16em; font-weight: 500; font-size: 12px;
  color: var(--gold); background: transparent; border: 1px solid var(--gold-d); padding: 11px 18px; border-radius: 3px; cursor: pointer;
}
button.ghost:hover { background: rgba(201,169,97,.1); }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }

/* --- Coin --- */
.coin {
  width: 132px; height: 132px; border-radius: 50%; flex: 0 0 auto;
  background: radial-gradient(circle at 35% 30%, var(--gold-l), var(--gold) 45%, var(--gold-d) 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;
  box-shadow: 0 0 0 4px #00000040, inset 0 0 18px #00000040; color: var(--ink);
  border: 3px solid var(--gold-l);
}
.coin .face-a { font-family: 'Anton', sans-serif; text-transform: uppercase; font-size: 15px; letter-spacing: .02em; }
.coin .face-b { font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 8px; letter-spacing: .12em; margin-top: 3px; padding: 0 8px; }
.coin.small { width: 64px; height: 64px; border-width: 2px; }
.coin.small .face-a { font-size: 9px; }
.coin.locked { background: #23211d; color: var(--grey); border-color: var(--line); box-shadow: none; }

/* --- Tables / lists --- */
table { width: 100%; border-collapse: collapse; }
th { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: .16em; font-size: 10px; color: var(--grey); text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--line); }
td { padding: 12px; border-bottom: 1px solid var(--line); font-size: 15px; }
tr.me td { background: rgba(201,169,97,.08); }
.rank { font-family: 'Anton', sans-serif; color: var(--gold); font-size: 18px; }
.pill { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: .12em; font-size: 10px; padding: 3px 8px; border: 1px solid var(--gold-d); border-radius: 999px; color: var(--gold); }

/* --- Misc --- */
.toast {
  position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%);
  background: var(--green); color: #04220f; font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: .14em; font-size: 12px; font-weight: 600;
  padding: 12px 20px; border-radius: 3px; opacity: 0; transition: opacity .25s, transform .25s; pointer-events: none; z-index: 50;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }
.disclaimer { margin-top: 30px; font-size: 11px; color: var(--grey); font-style: italic; border-top: 1px solid var(--line); padding-top: 14px; }
.prize { display: flex; align-items: center; gap: 16px; }
.prize .stat { font-size: 30px; }
a.activate-link { color: var(--gold); font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: .08em; word-break: break-all; }
.empty { color: var(--grey); font-style: italic; padding: 20px 0; }

/* --- GPS panel + plan-view shot tracer --- */
.track { position: relative; height: 58px; background: linear-gradient(90deg, #1c3320, #2f5a30); border: 1px solid var(--line); border-radius: 29px; margin: 12px 0 14px; overflow: hidden; }
.track .green { position: absolute; right: 0; top: 0; bottom: 0; width: 9%; background: radial-gradient(circle at 70% 50%, #4fae6c, #2f7d46); border-left: 2px solid #cfe6d6; }
.track .tee { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 9px; height: 9px; border-radius: 50%; background: var(--cream); z-index: 3; }
.track .ballline { position: absolute; left: 8px; top: 50%; height: 3px; background: linear-gradient(90deg, var(--gold-d), var(--gold-l)); transform: translateY(-50%); z-index: 2; border-radius: 2px; }
.track .ball { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 15px; height: 15px; border-radius: 50%; background: var(--gold-l); box-shadow: 0 0 0 3px #00000055, 0 0 12px var(--gold); z-index: 4; }
.track .hz { position: absolute; transform: translate(-50%, -50%); z-index: 2; }
.track .hz.bunker { top: 64%; width: 13px; height: 13px; border-radius: 50%; background: #ddca97; border: 1px solid #9d885a; }
.track .hz.water { top: 62%; width: 16px; height: 11px; border-radius: 3px; background: #3b7fb5; border: 1px solid #2a5f8a; }
.gps-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 10px 0; }
.gps-grid .g { background: var(--ink); border: 1px solid var(--line); border-radius: 4px; padding: 10px; text-align: center; }
.gps-grid .g .n { font-family: 'Anton', sans-serif; font-size: 28px; color: var(--gold); line-height: 1; }
.gps-grid .g .l { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: .14em; font-size: 9px; color: var(--grey); margin-top: 4px; }
.hzlist { font-size: 12px; color: var(--grey-2); margin: 4px 0; }
.shotlog { font-size: 13px; color: var(--cream-2); }
.shotlog .s { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--line); }
.contest-strip { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
.contest-strip .c { flex: 1; min-width: 210px; background: linear-gradient(180deg, var(--panel), var(--ink-2)); border: 1px solid var(--gold-d); border-radius: 4px; padding: 12px 14px; }
.contest-strip .c .l { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: .18em; font-size: 10px; color: var(--gold); }
.contest-strip .c .v { font-family: 'Jost', sans-serif; font-size: 15px; color: var(--cream); margin-top: 4px; }
tr.focus td { background: rgba(201,169,97,.14); }
td .target { cursor: pointer; color: var(--gold); font-size: 11px; font-family: 'Oswald', sans-serif; letter-spacing: .08em; }

</style>

    .map(([id, coins]) => ({ userId: id, name: (store.users.find(u => u.id === id) || {}).name || '—', coins }))
    .sort((a, b) => b.coins - a.coins)
    .slice(0, 10)
    .map((r, i) => ({ rank: i + 1, ...r }));
}

// Player stats / analysis (the "flex" screen) — derived from finished rounds + logged shots.
function playerStats(store, userId) {
  const rounds = store.rounds.filter(r => r.userId === userId && r.finishedAt);
  let holes = 0, totalVsPar = 0, parsOrBetter = 0;
  const byPar = { 3: { n: 0, sum: 0 }, 4: { n: 0, sum: 0 }, 5: { n: 0, sum: 0 } };
  const drives = [], stablefords = [];
  for (const r of rounds) {
    const detail = getCourseDetail(store, r.courseId);
    for (const h of detail.holes) {
      const g = r.grosses[h.hole];
      if (g != null) {
        holes++; const vs = g - h.par; totalVsPar += vs; if (vs <= 0) parsOrBetter++;
        if (byPar[h.par]) { byPar[h.par].n++; byPar[h.par].sum += g; }
      }
      const sh = (r.shots && r.shots[h.hole]) || [];
      if (sh.length && h.par >= 4) drives.push(Number(sh[0]));
    }
    if (r.stablefordTotal != null) stablefords.push(r.stablefordTotal);
  }
  const avg = a => (a.length ? Math.round(a.reduce((x, y) => x + y, 0) / a.length) : 0);
  return {
    rounds: rounds.length, holesPlayed: holes,
    avgVsPar: holes ? (totalVsPar / holes).toFixed(1) : '0.0',
    parsOrBetterPct: holes ? Math.round((parsOrBetter / holes) * 100) : 0,
    avgStableford: avg(stablefords), bestStableford: stablefords.length ? Math.max(...stablefords) : 0,
    avgDrive: avg(drives), longestDrive: drives.length ? Math.max(...drives) : 0,
    byPar: [3, 4, 5].map(p => ({ par: p, avg: byPar[p].n ? (byPar[p].sum / byPar[p].n).toFixed(1) : '—', holes: byPar[p].n })),
  };
}

// Operations / admin view (the Habari-CTO-scope panel, now PI-tech): revenue, sell-through,
// division spread, impressions, score-verification backlog, top of the board.
function adminDashboard(store) {
  const perCourse = store.courses.map(c => {
    const sold = store.entries.filter(e => e.courseId === c.id).length;
    const inventory = store.coins.filter(k => k.courseId === c.id).length;
    return { course: c.name, abbr: c.abbr, sold, inventory, sellThrough: Math.round((sold / inventory) * 100) };
  });
  const byDivision = ['A', 'B', 'C'].map(d => ({ division: d, players: store.users.filter(u => u.division === d).length }));
  const grossEntry = store.entries.length * ENTRY_FEE;
  const coinCost = store.coins.filter(c => c.status !== 'unissued').length * COIN_COST;
  return {
    coinsSold: store.entries.length,
    coinsActivated: store.coins.filter(c => c.status === 'active').length,
    totalInventory: store.coins.length,
    sellThrough: Math.round((store.entries.length / store.coins.length) * 100),
    activePlayers: store.users.length,
    pendingScores: store.scores.filter(s => !s.verified).length,
    verifiedScores: store.scores.filter(s => s.verified).length,
    grossEntryRevenue: grossEntry,
    coinCostIncurred: coinCost,
    entryContribution: grossEntry - coinCost,
    lexusImpressions: store.impressions.filter(i => i.sponsorId === 'lexus').length,
    perCourse,
    byDivision,
    topPlayers: leaderboard(store).slice(0, 5),
    pendingReviews: pendingReviews(store),
  };
}

async function renderCourseDetail(courseId) {
  const c = await api.get('/course/' + courseId);
  const out = c.holes.slice(0, 9), inn = c.holes.slice(9);
  const sumPar = hs => hs.reduce((s, h) => s + (h.par || 0), 0);
  const sumDist = hs => hs.reduce((s, h) => s + (h.distanceMeters || 0), 0);
  const row = h => `<tr class="${h.hole === c.signatureHole ? 'me' : ''}"><td>${h.hole}${h.hole === c.signatureHole ? ' ★' : ''}</td><td>${h.par}</td><td>${h.strokeIndex}</td><td>${h.distanceMeters ? h.distanceMeters + 'm' : '—'}${h.inferred ? ' <span class="muted">~</span>' : ''}</td></tr>`;
  const tbl = hs => `<table><thead><tr><th>Hole</th><th>Par</th><th>SI</th><th>Distance</th></tr></thead><tbody>${hs.map(row).join('')}</tbody></table>`;
  return `<div class="view">
    <button class="ghost" id="backCourses" style="margin-bottom:14px">← All courses</button>
    <span class="eyebrow">${c.region}${c.designer ? ' · ' + c.designer : ''}</span>

    <div class="row" style="gap:10px;margin:4px 0 8px">${confBadge(c.dataConfidence)}<span class="stat-sub">Par ${c.par}${c.totalMeters ? ' · ' + c.totalMeters.toLocaleString('en-ZA') + 'm' : ''}</span></div>
    ${c.config ? `<p class="lead" style="font-size:14px;margin:0 0 16px">${c.config}</p>` : ''}
    <div class="grid cols-2">
      <div class="card" style="padding:6px 8px"><span class="label" style="padding:8px;display:block">Front 9 — par ${sumPar(out)} · ${sumDist(out)}m</span>${tbl(out)}</div>
      <div class="card" style="padding:6px 8px"><span class="label" style="padding:8px;display:block">Back 9 — par ${sumPar(inn)} · ${sumDist(inn)}m</span>${tbl(inn)}</div>
    </div>
    ${state.userId ? `<button class="cta" style="margin-top:18px" data-play="${c.id}">Play hole-by-hole →</button>` : `<p class="disclaimer">Register to play a live round on this course.</p>`}
    <p class="disclaimer">★ signature hole. ~ = value to verify against the official scorecard / SAGA. Source: ${(c.sources || []).join('; ') || 'provisional template'}.</p>
  </div>`;
}

function gpsFor(holeMeters, shots) {
  const played = (shots || []).reduce((s, x) => s + Number(x || 0), 0);
  const toPin = Math.max(0, holeMeters - played);
  return { played, toPin, toFront: Math.max(0, Math.round(toPin - 8)), toBack: Math.round(toPin + 8) };
}

function planView(h, shots) {
  const W = h.distanceMeters || 1;
  const g = gpsFor(W, shots);
  const ballPct = Math.min(95, (g.played / W) * 100);
  const hz = (h.hazards || []).map(z => `<div class="hz ${z.type}" style="left:${Math.min(94, (z.fromTee / W) * 100)}%" title="${z.name} ${z.fromTee}m"></div>`).join('');
  const ball = g.played > 0 ? `<div class="ballline" style="width:calc(${ballPct}% - 8px)"></div><div class="ball" style="left:${ballPct}%"></div>` : '';
  return `<div class="track"><div class="tee"></div>${hz}<div class="green"></div>${ball}</div>`;
}

function contestStrip() {
  const c = state.round.contests || {};
  const ld = c.longestDrive, np = c.nearestPin;
  return `<div class="contest-strip">
    <div class="c"><div class="l">⛳ Lexus Longest Drive</div><div class="v">${ld ? `${ld.meters}m — ${ld.player} · ${ld.course} H${ld.hole}` : 'No drives logged yet'}</div></div>
    <div class="c"><div class="l">🎯 Lexus Nearest the Pin</div><div class="v">${np ? `${np.meters}m — ${np.player} · ${np.course} H${np.hole}` : 'No par-3 tee shots yet'}</div></div>
  </div>`;
}

function focusPanel() {
  const r = state.round;
  const h = r.course.holes.find(x => x.hole === r.focus) || r.course.holes[0];
  const shots = (r.shotsByHole && r.shotsByHole[h.hole]) || [];
  const g = gpsFor(h.distanceMeters || 0, shots);
  const hazRows = (h.hazards || []).map(z => {
    const reach = z.fromTee - g.played;
    return `<div class="hzlist">${z.type === 'water' ? '💧' : '🟡'} ${z.name} — ${z.fromTee}m${reach > 0 ? ` · ${reach}m to reach` : ' · cleared'}</div>`;
  }).join('');
  const shotRows = shots.map((s, i) => {
    const after = Math.max(0, (h.distanceMeters || 0) - shots.slice(0, i + 1).reduce((a, b) => a + Number(b), 0));
    return `<div class="s"><span>Shot ${i + 1} · ${s}m</span><span class="muted">${after}m to pin</span></div>`;
  }).join('');
  return `<div class="card" style="margin-bottom:14px">
    <span class="eyebrow">GPS &amp; shot tracer · Powered by Lexus</span>
    <div class="row" style="justify-content:space-between;align-items:baseline;margin-top:4px">
      <span class="label" style="font-size:15px">Hole ${h.hole}${h.hole === r.course.signatureHole ? ' ★' : ''} · Par ${h.par} · SI ${h.strokeIndex}</span>
      <span class="stat-sub">${h.distanceMeters ? h.distanceMeters + 'm' : '—'}</span>
    </div>
    ${planView(h, shots)}
    <div class="gps-grid">
      <div class="g"><div class="n">${g.toFront}</div><div class="l">To front</div></div>
      <div class="g"><div class="n">${g.toPin}</div><div class="l">To pin</div></div>
      <div class="g"><div class="n">${g.toBack}</div><div class="l">To back</div></div>
    </div>
    ${hazRows ? `<div style="margin:8px 0">${hazRows}</div>` : ''}
    <div class="row" style="margin-top:8px">
      <input type="number" id="shotDist" min="1" max="400" placeholder="shot (m)" style="width:120px;margin:0" />
      <button class="ghost" id="addShot">Log shot →</button>
      ${shots.length ? `<button class="ghost" id="undoShot">Undo</button>` : ''}
    </div>
    ${shotRows ? `<div class="shotlog" style="margin-top:10px">${shotRows}</div>` : ''}
    <p class="disclaimer">GPS distances &amp; hazards are provisional (demo) — production uses mapped course coordinates + phone GPS.</p>
  </div>`;
}

function renderRound() {
  const { course, card, courseHcp, division } = state.round;
  if (!state.round.focus) state.round.focus = 1;
  const byHole = {};
  (card?.detail || []).forEach(d => { byHole[d.hole] = d; });
  const rows = course.holes.map(h => {
    const d = byHole[h.hole] || {};
    const cls = h.hole === state.round.focus ? 'focus' : (h.hole === course.signatureHole ? 'me' : '');
    return `<tr class="${cls}">
      <td>${h.hole}${h.hole === course.signatureHole ? ' ★' : ''}</td><td>${h.par}</td><td>${h.strokeIndex}</td>
      <td><span class="target" data-focus="${h.hole}">${h.distanceMeters ? h.distanceMeters + 'm' : '—'} 🎯</span></td>
      <td><input type="number" min="1" max="15" data-hole="${h.hole}" value="${d.gross != null ? d.gross : ''}" style="width:60px;margin:0;padding:6px;text-align:center" /></td>
      <td class="gold">${d.stableford != null && d.gross != null ? d.stableford : '·'}</td></tr>`;
  }).join('');
  const t = card || { grossTotal: 0, nettTotal: 0, stablefordTotal: 0, holesPlayed: 0 };
  return `<div class="view">
    <span class="eyebrow">Live scorecard · Powered by Lexus</span>
    <h1 class="title display" style="font-size:clamp(26px,5vw,46px)">${course.name}</h1>
    <p class="lead" style="margin:6px 0 14px">${division?.label || ''} · course handicap ${courseHcp}. Tap a hole's 🎯 for GPS &amp; shot tracer; enter gross for live Stableford (blank = pickup).</p>
    ${contestStrip()}
    <div class="grid cols-3" style="margin-bottom:14px">
      <div class="card"><span class="label">Stableford</span><div class="stat">${t.stablefordTotal}</div><div class="stat-sub">${t.holesPlayed}/18 holes</div></div>
      <div class="card"><span class="label">Gross</span><div class="stat" style="font-size:30px">${t.grossTotal}</div></div>
      <div class="card"><span class="label">Nett</span><div class="stat" style="font-size:30px">${t.nettTotal}</div></div>
    </div>
    ${focusPanel()}
    <div class="card" style="padding:6px 8px"><table><thead><tr><th>Hole</th><th>Par</th><th>SI</th><th>Dist</th><th>Gross</th><th>Pts</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="row" style="margin-top:16px"><button class="cta" id="finishRound">Finish & submit →</button><button class="ghost" id="cancelRound">Cancel</button></div>
  </div>`;
}

afterRender.courses = () => {
  $app.querySelectorAll('.course-card[data-course], button[data-course]').forEach(el => el.onclick = (e) => {
    e.stopPropagation(); state.selectedCourse = el.dataset.course; go('courses');
  });
  const back = document.getElementById('backCourses');
  if (back) back.onclick = () => { state.selectedCourse = null; go('courses'); };
  const play = $app.querySelector('[data-play]');
  if (play) play.onclick = async () => {
    const r = await api.post('/round/start', { userId: state.userId, courseId: play.dataset.play });
    state.round = { roundId: r.round.id, course: r.course, card: null, courseHcp: r.courseHcp, division: r.division, focus: 1, shotsByHole: {} };
    state.selectedCourse = null; go('courses');
  };
  $app.querySelectorAll('input[data-hole]').forEach(inp => inp.onchange = async () => {
    const r = await api.post('/round/hole', { roundId: state.round.roundId, hole: Number(inp.dataset.hole), gross: inp.value });
    state.round.card = r.card; go('courses');
  });
  // GPS / shot-tracer wiring
  $app.querySelectorAll('[data-focus]').forEach(el => el.onclick = () => { state.round.focus = Number(el.dataset.focus); go('courses'); });
  const addShot = document.getElementById('addShot');
  if (addShot) addShot.onclick = async () => {
    const v = document.getElementById('shotDist').value;
    if (!v) return;
    const r = await api.post('/round/shot', { roundId: state.round.roundId, hole: state.round.focus, distance: v });
    state.round.shotsByHole[state.round.focus] = r.shots; go('courses');
  };
  const undoShot = document.getElementById('undoShot');
  if (undoShot) undoShot.onclick = async () => {
    const r = await api.post('/round/shot', { roundId: state.round.roundId, hole: state.round.focus, distance: 'undo' });
    state.round.shotsByHole[state.round.focus] = r.shots; go('courses');
  };
  const fin = document.getElementById('finishRound');
  if (fin) fin.onclick = async () => {
    const r = await api.post('/round/finish', { roundId: state.round.roundId });
    state.round = null; toast(`Round in — ${r.card.stablefordTotal} pts, pending verification`); go('play');
  };
  const can = document.getElementById('cancelRound');
  if (can) can.onclick = () => { state.round = null; go('courses'); };
};

function renderChallengeCard(c) {
  const me = state.userId;
  const opp = c.fromUserId === me ? c.toName : c.fromName;
  const dir = c.fromUserId === me ? `You → ${c.toName}` : `${c.fromName} → You`;
  let body = '';
  if (c.status === 'pending' && c.toUserId === me) {
    body = `<div class="row"><button class="cta" data-respond="${c.id}" data-accept="1">Accept</button><button class="ghost" data-respond="${c.id}" data-accept="0">Decline</button></div>`;
  } else if (c.status === 'pending') {
    body = `<span class="stat-sub">Awaiting ${opp}'s response…</span>`;
  } else if (c.status === 'accepted') {
    body = `<div class="row" style="gap:8px;flex-wrap:wrap;align-items:flex-end">
      <label class="field" style="margin:0"><span class="label">${c.fromName} pts</span><input type="number" min="0" max="50" data-rf="${c.id}" style="width:90px;margin-top:4px" /></label>
      <label class="field" style="margin:0"><span class="label">${c.toName} pts</span><input type="number" min="0" max="50" data-rt="${c.id}" style="width:90px;margin-top:4px" /></label>
      <button class="cta" data-result="${c.id}">📷 Capture evidence &amp; submit</button></div>
      <p class="disclaimer" style="margin-top:6px">A photo of the agreed scorecard is required — the result is held for a marshal to verify (anti-cheat).</p>`;
  } else if (c.status === 'pending_review') {
    body = `<span class="pill" style="border-color:var(--gold);color:var(--gold)">Pending marshal review</span> <span class="stat-sub">${c.result.fromStableford}–${c.result.toStableford} · ${c.winnerName} · 📷 evidence attached</span>`;
  } else if (c.status === 'verified') {
    const xfer = c.coinTransferred ? ` · 🪙 ${c.coinTransferred.serial} → ${c.winnerName}${c.coinTransferred.loserEliminated ? ' · loser eliminated' : ''}` : '';
    body = `<span class="pill" style="border-color:var(--green);color:var(--green)">✓ Verified</span> <span class="stat-sub">${c.result.fromStableford}–${c.result.toStableford} · Winner: ${c.winnerName}${xfer}</span>`;
  } else if (c.status === 'declined') {
    body = `<span class="stat-sub muted">Declined</span>`;
  }
  return `<div class="card"><div class="row" style="justify-content:space-between"><span class="label" style="font-size:14px">${dir}${c.staked ? ' · 🪙 staked' : ''}</span><span class="stat-sub">${c.courseName}</span></div><div style="margin-top:10px">${body}</div></div>`;
}

views.challenges = async () => {
  const [pl, ch] = await Promise.all([api.get('/players?exclude=' + state.userId), api.get('/challenges/' + state.userId)]);
  const players = pl.players.map(p => `
    <tr><td>${p.name}${!p.active ? ' <span class="pill" style="border-color:#c0504d;color:#d98b88">out</span>' : ''}</td><td><span class="pill">${p.division}</span></td><td class="gold">${p.points}</td><td>${p.coins}</td>
    <td><button class="ghost" data-challenge="${p.id}" data-name="${p.name}">Challenge →</button></td></tr>`).join('')
    || `<tr><td colspan="5" class="empty">No other players registered yet.</td></tr>`;
  const myCh = ch.challenges.map(renderChallengeCard).join('') || `<p class="empty">No challenges yet — challenge a player above.</p>`;
  return `<div class="view">
    <span class="eyebrow">Social · Challenge the field</span>
    <h1 class="title display">Challenges</h1>
    <p class="lead">Every registered player is in the league database — challenge anyone head-to-head. Results need photo evidence and a marshal's tick before they count. Powered by Lexus.</p>
    <div class="card" style="margin-bottom:14px;border-color:var(--gold-d)">
      <label class="row" style="gap:8px;cursor:pointer"><input type="checkbox" id="stakeToggle" style="width:auto;margin:0" /> <span class="label" style="font-size:13px">⚔️ Stake my digital coin — winner takes the loser's digital coin (you keep the physical)</span></label>
      <p class="disclaimer" style="margin-top:6px">No cash changes hands. ⚠️ Staking + elimination + re-entry is gambling-adjacent — under legal review (counsel); demo only, not a confirmed rule.</p>
    </div>
    <span class="label" style="display:block;margin:6px 0 10px">Players in the league</span>
    <div class="card" style="padding:6px 8px"><table><thead><tr><th>Player</th><th>Div</th><th>Points</th><th>Coins</th><th></th></tr></thead><tbody>${players}</tbody></table></div>
    <span class="label" style="display:block;margin:22px 0 10px">My challenges</span>
    <div class="grid">${myCh}</div>
  </div>`;
};
afterRender.challenges = () => {
  $app.querySelectorAll('[data-challenge]').forEach(b => b.onclick = async () => {
    const st = document.getElementById('stakeToggle');
    const staked = !!(st && st.checked);
    await api.post('/challenge', { fromUserId: state.userId, toUserId: b.dataset.challenge, staked });
    toast(`Challenge sent to ${b.dataset.name}${staked ? ' · coin staked' : ''}`); go('challenges');
  });
  $app.querySelectorAll('[data-respond]').forEach(b => b.onclick = async () => {
    await api.post('/challenge/respond', { challengeId: b.dataset.respond, accept: b.dataset.accept === '1' });
    toast(b.dataset.accept === '1' ? 'Challenge accepted' : 'Challenge declined'); go('challenges');
  });
  $app.querySelectorAll('[data-result]').forEach(b => b.onclick = async () => {
    const id = b.dataset.result;
    const f = $app.querySelector(`[data-rf="${id}"]`).value, t = $app.querySelector(`[data-rt="${id}"]`).value;
    if (f === '' || t === '') { toast('Enter both scores'); return; }
    await api.post('/challenge/result', { challengeId: id, fromStableford: f, toStableford: t, evidence: `photo-${Date.now()}.jpg` });
    toast('Evidence captured · sent for marshal review'); go('challenges');
  });
};

views.stats = async () => {
  const s = await api.get('/stats/' + state.userId);
  const parCards = s.byPar.map(p => `<div class="card" style="text-align:center"><div class="stat" style="font-size:26px">${p.avg}</div><div class="stat-sub">Par ${p.par} avg · ${p.holes} holes</div></div>`).join('');
  return `<div class="view">
    <span class="eyebrow">Your game · Stats &amp; analysis</span>
    <h1 class="title display">My Stats</h1>
    <p class="lead">Your performance across ${s.rounds} round${s.rounds === 1 ? '' : 's'} (${s.holesPlayed} holes) — the flex. Built from your scorecards + shot tracer. Powered by Lexus.</p>
    ${s.rounds === 0 ? `<p class="empty">Play and finish a round (Courses → Play hole-by-hole) to build your stats.</p>` : `
    <div class="grid cols-3" style="margin:6px 0 16px">
      <div class="card"><span class="label">Avg Stableford</span><div class="stat">${s.avgStableford}</div><div class="stat-sub">best ${s.bestStableford}</div></div>
      <div class="card"><span class="label">Avg vs par</span><div class="stat">${s.avgVsPar > 0 ? '+' + s.avgVsPar : s.avgVsPar}</div><div class="stat-sub">${s.parsOrBetterPct}% pars or better</div></div>
      <div class="card"><span class="label">Avg drive</span><div class="stat">${s.avgDrive}<span style="font-size:16px">m</span></div><div class="stat-sub">longest ${s.longestDrive}m</div></div>
    </div>
    <span class="label" style="display:block;margin-bottom:12px">Scoring by par</span>
    <div class="grid cols-3">${parCards}</div>
    <p class="disclaimer">Avg-drive uses your logged tee shots; production adds GIR, putts and strokes-gained once full shot-by-shot capture is on.</p>`}
  </div>`;
};

window.go = go;
window.signOut = () => { localStorage.removeItem('p4tc_user'); state.userId = null; state.me = null; toast('Signed out'); go('home'); };

(async function init() {
  state.boot = await api.get('/bootstrap');
  await go('home');
})();

})();

</script>
